<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>登录 - 商圈查找工具</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        /* Animated background circles */
        body::before, body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            opacity: 0.08;
            background: white;
            animation: float 20s ease-in-out infinite;
        }
        body::before {
            width: 400px; height: 400px;
            top: -100px; right: -100px;
        }
        body::after {
            width: 300px; height: 300px;
            bottom: -80px; left: -80px;
            animation-delay: -10s;
            animation-duration: 25s;
        }
        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -30px) scale(1.05); }
            66% { transform: translate(-20px, 20px) scale(0.95); }
        }

        .login-container {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.25), 0 0 0 1px rgba(255,255,255,0.1);
            padding: 44px 34px;
            width: 100%;
            max-width: 400px;
            animation: cardIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        @keyframes cardIn {
            from { opacity: 0; transform: translateY(30px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .login-header { text-align: center; margin-bottom: 32px; }
        .login-header .logo {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 16px;
            display: inline-flex; align-items: center; justify-content: center;
            margin-bottom: 16px;
            box-shadow: 0 8px 24px rgba(102, 126, 234, 0.35);
        }
        .login-header .logo svg { width: 28px; height: 28px; }
        .login-header h1 {
            color: #1a1a2e;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 6px;
            letter-spacing: -0.3px;
        }
        .login-header p { color: #888; font-size: 14px; }

        .form-group { margin-bottom: 20px; position: relative; }
        .form-group label {
            display: block; color: #555; font-size: 13px;
            font-weight: 600; margin-bottom: 6px;
            transition: color 0.2s;
        }
        .form-group:focus-within label { color: #667eea; }
        .form-group input {
            width: 100%; padding: 12px 14px;
            border: 2px solid #e8e8ee;
            border-radius: 12px; font-size: 15px;
            background: #f8f8fc;
            transition: all 0.25s ease;
        }
        .form-group input:focus {
            outline: none; border-color: #667eea;
            background: white;
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .btn-login {
            width: 100%; padding: 13px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white; border: none; border-radius: 12px;
            font-size: 15px; font-weight: 600; cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            margin-top: 8px;
            position: relative;
            overflow: hidden;
        }
        .btn-login::after {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
            transform: translateX(-100%);
            transition: none;
        }
        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }
        .btn-login:hover::after {
            transform: translateX(100%);
            transition: transform 0.6s ease;
        }
        .btn-login:active { transform: translateY(0); }
        .btn-login:disabled {
            opacity: 0.65; cursor: not-allowed;
            transform: none; box-shadow: none;
        }

        .error-message {
            background: linear-gradient(135deg, #fff5f5, #ffe8e8);
            color: #d63031;
            padding: 12px 14px;
            border-radius: 10px;
            font-size: 13px; font-weight: 500;
            margin-top: 16px;
            border: 1px solid #ffd0d0;
            display: none;
            animation: shake 0.4s ease;
        }
        .error-message.show { display: block; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-6px); }
            40% { transform: translateX(6px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }

        @media (max-width: 480px) {
            .login-container { padding: 32px 22px; border-radius: 20px; }
            .login-header h1 { font-size: 22px; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/>
                    <circle cx="12" cy="10" r="3"/>
                </svg>
            </div>
            <h1>商圈查找工具</h1>
            <p>请登录以继续</p>
        </div>
        <form id="loginForm">
            <div class="form-group">
                <label for="username">用户名</label>
                <input type="text" id="username" name="username" required autocomplete="username" placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="请输入密码">
            </div>
            <button type="submit" class="btn-login" id="loginBtn">登录</button>
            <div class="error-message" id="errorMessage"></div>
        </form>
    </div>
    <script>
        const form = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');
        const loginBtn = document.getElementById('loginBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            if (!username || !password) { showError('请输入用户名和密码'); return; }

            loginBtn.disabled = true;
            loginBtn.textContent = '登录中...';
            errorMessage.classList.remove('show');

            try {
                const formData = new FormData();
                formData.append('username', username);
                formData.append('password', password);
                const response = await fetch('/login', { method: 'POST', body: formData });
                const data = await response.json();
                if (data.success) {
                    window.location.href = data.redirect || '/search';
                } else {
                    showError(data.message || '登录失败，请检查用户名和密码');
                    loginBtn.disabled = false;
                    loginBtn.textContent = '登录';
                }
            } catch (error) {
                showError('网络错误，请稍后重试');
                loginBtn.disabled = false;
                loginBtn.textContent = '登录';
            }
        });

        function showError(message) {
            errorMessage.textContent = message;
            errorMessage.classList.remove('show');
            void errorMessage.offsetWidth; /* reflow to retrigger animation */
            errorMessage.classList.add('show');
        }
    </script>
</body>
</html>
